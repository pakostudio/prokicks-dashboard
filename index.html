<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PRO KICKS Dashboard</title>

<style>
body{font-family:sans-serif;background:#f8f7f4;margin:0;padding:20px}
h1{margin-bottom:20px}
.kpi{display:inline-block;background:#fff;border:1px solid #ddd;border-radius:10px;padding:20px;margin:10px;min-width:120px;text-align:center}
.kpi h2{margin:0;font-size:28px}
</style>
</head>

<body>

<h1>PRO KICKS Dashboard</h1>

<div id="kpis"></div>

<script>

var SID = "1Ctv4JwJDc8MnIjp4B6_ekYI0WjqMgprPOB0ceh9lEAs";
var GID = "331472093";

async function cargar(){
  try{
    var url = "https://docs.google.com/spreadsheets/d/"+SID+"/export?format=csv&gid="+GID+"&t="+Date.now();

    var res = await fetch(url);
    var txt = await res.text();

    var rows = txt.split("\n").map(r=>r.split(","));

    // buscamos fila con datos (la 5 normalmente)
    var data = rows[4];

    var cerradas = parseInt(data[1])||0;
    var incompletas = parseInt(data[2])||0;
    var prospeccion = parseInt(data[3])||0;
    var comodato = parseInt(data[4])||0;
    var total = parseInt(data[5])||0;

    document.getElementById("kpis").innerHTML = `
      <div class="kpi"><h2>${cerradas}</h2>Ventas Cerradas</div>
      <div class="kpi"><h2>${prospeccion}</h2>Prospección</div>
      <div class="kpi"><h2>${comodato}</h2>Comodato</div>
      <div class="kpi"><h2>${total}</h2>Total Devices</div>
    `;

  }catch(e){
    document.body.innerHTML = "Error cargando datos";
    console.error(e);
  }
}

cargar();

</script>

</body>
</html>
