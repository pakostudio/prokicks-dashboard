<html lang="es"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PRO KICKS - Sales + CRM</title>
<style>
  :root{
    --bg:#F8F7F4;
    --bg2:#FFFFFF;
    --card:#FFFFFF;
    --border:#E5E2DB;
    --text:#1A1A1A;
    --muted:#6B7280;
    --accent:#111827;
    --green:#10B981;
    --green-bg:#ECFDF5;
    --red:#EF4444;
    --red-bg:#FEF2F2;
    --blue:#3B82F6;
    --blue-bg:#EFF6FF;
    --yellow:#F59E0B;
    --yellow-bg:#FFFBEB;
    --purple:#8B5CF6;
    --purple-bg:#F5F3FF;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);font-size:14px}
  .app{display:flex;flex-direction:column;min-height:100vh}
  #mainNav{background:var(--accent);padding:0 16px;display:flex;align-items:center;gap:4px;height:48px;overflow-x:auto}
  #mainNav .logo{color:#fff;font-weight:800;font-size:15px;letter-spacing:.5px;margin-right:16px;white-space:nowrap;display:flex;align-items:center;gap:8px}
  .nav-tab{background:none;border:none;color:rgba(255,255,255,.65);padding:8px 14px;border-radius:6px;cursor:pointer;font-size:13px;font-weight:500;white-space:nowrap;transition:all .15s}
  .nav-tab.on{color:#fff;background:rgba(255,255,255,.18)}
  #mainContent{flex:1;padding:20px;max-width:1400px;width:100%;margin:0 auto}
  .card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px;margin-bottom:16px}
  .kpi-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:20px}
  .kpi{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:16px;text-align:center}
  .kpi-val{font-size:28px;font-weight:800;color:var(--accent)}
  .tbl{width:100%;border-collapse:collapse;font-size:13px}
  .tbl th{padding:10px 12px;text-align:left;border-bottom:2px solid var(--border)}
  .tbl td{padding:10px 12px;border-bottom:1px solid var(--border)}
</style>
</head>
<body>
<div class="app">
  <nav id="mainNav">
    <div class="logo">PRO KICKS</div>
    <button class="nav-tab on" onclick="switchMain('dashboard')">Dashboard</button>
    <button class="nav-tab" onclick="switchMain('crm')">CRM</button>
    <button class="nav-tab" onclick="switchMain('ventas')">Ventas</button>
  </nav>
  <div id="mainContent"></div>
</div>

<script>
var mainTab='dashboard';

function switchMain(tab){
  mainTab=tab;
  renderMain();
}

function renderMain(){
  var mc=document.getElementById('mainContent');
  if(mainTab==='dashboard'){
    mc.innerHTML='<h1>Dashboard PRO KICKS</h1><p>Datos conectados correctamente</p>';
  }
  if(mainTab==='crm'){
    mc.innerHTML='<h1>CRM</h1><p>Leads aparecerán aquí</p>';
  }
  if(mainTab==='ventas'){
    mc.innerHTML='<h1>Ventas</h1><p>Pipeline aquí</p>';
  }
}

renderMain();
</script>
</body>
</html>
