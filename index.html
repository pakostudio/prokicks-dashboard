<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PRO KICKS INVENTARIO</title>

<style>
body{
  margin:0;
  font-family: Inter, Arial;
  background:#0f172a;
  color:#fff;
}

.container{
  padding:30px;
}

.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:30px;
}

.title{
  font-size:38px;
  font-weight:900;
}

.tabs button{
  margin-right:10px;
  padding:10px 16px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  background:#1e293b;
  color:#fff;
}

.tabs button.active{
  background:#3b82f6;
}

.card{
  background:#1e293b;
  padding:20px;
  border-radius:16px;
}

table{
  width:100%;
  border-collapse:collapse;
  margin-top:20px;
}

th{
  text-align:left;
  padding:12px;
  font-size:12px;
  color:#94a3b8;
}

td{
  padding:14px;
  border-top:1px solid #334155;
}

.badge{
  padding:6px 10px;
  border-radius:20px;
  font-size:12px;
  font-weight:bold;
}

.green{background:#16a34a;}
.yellow{background:#eab308;}
.blue{background:#3b82f6;}
</style>
</head>

<body>

<div class="container">

<div class="header">
  <div class="title">PRO KICKS INVENTARIO</div>
  <div class="tabs">
    <button onclick="setTab('pipeline')" id="btn-pipeline">Ventas</button>
    <button onclick="setTab('comodatos')" id="btn-comodatos">Inventario en uso</button>
    <button onclick="setTab('cobranza')" id="btn-cobranza">Cobranza</button>
    <button onclick="setTab('leads')" id="btn-leads">Leads</button>
  </div>
</div>

<div id="app" class="card">Cargando...</div>

</div>

<script>

const API = "https://script.google.com/macros/s/AKfycbwzzE4ESNn1-dQmlgupZhIrCCI76Skf5IWBAK61OhIv2hAZMbkepNB7O5cm7SGojr0kfg/exec";

let data = {};
let tab = "pipeline";

function badge(txt){
  txt = (txt||"").toUpperCase();

  if(txt.includes("PAGADO") || txt.includes("CERRADA"))
    return `<span class="badge green">${txt}</span>`;

  if(txt.includes("PENDIENTE"))
    return `<span class="badge yellow">${txt}</span>`;

  return `<span class="badge blue">${txt}</span>`;
}

function setTab(t){
  tab = t;
  document.querySelectorAll(".tabs button").forEach(b=>b.classList.remove("active"));
  document.getElementById("btn-"+t).classList.add("active");
  render();
}

async function load(){
  const res = await fetch(API);
  data = await res.json();
  setTab("pipeline");
}

function render(){

  const el = document.getElementById("app");

  if(tab==="pipeline"){
    el.innerHTML = `
      <h2>Ventas</h2>
      <table>
        <tr>
          <th>Cliente</th><th>Rep</th><th>Devices</th>
          <th>Venta</th><th>Pago</th><th>Saldo</th><th>Ciudad</th>
        </tr>
        ${data.pipeline.map(r=>`
          <tr>
            <td>${r.cliente}</td>
            <td>${r.rep}</td>
            <td>${r.devices}</td>
            <td>${badge(r.estadoVenta)}</td>
            <td>${badge(r.estadoPago)}</td>
            <td>${r.saldo}</td>
            <td>${r.ciudad}</td>
          </tr>
        `).join("")}
      </table>
    `;
  }

  if(tab==="comodatos"){
    el.innerHTML = `
      <h2>Inventario en uso</h2>
      <table>
        <tr>
          <th>Cliente</th><th>Rep</th><th>Devices</th>
          <th>Status</th><th>Ciudad</th>
        </tr>
        ${data.comodatos.map(r=>`
          <tr>
            <td>${r.cliente}</td>
            <td>${r.rep}</td>
            <td>${r.devices}</td>
            <td>${badge(r.estado)}</td>
            <td>${r.ciudad}</td>
          </tr>
        `).join("")}
      </table>
    `;
  }

  if(tab==="cobranza"){
    el.innerHTML = `
      <h2>Cobranza</h2>
      <table>
        <tr>
          <th>Cliente</th><th>Rep</th><th>Saldo</th><th>Status</th>
        </tr>
        ${data.cobranza.map(r=>`
          <tr>
            <td>${r.cliente}</td>
            <td>${r.rep}</td>
            <td>${r.saldo}</td>
            <td>${badge(r.estado)}</td>
          </tr>
        `).join("")}
      </table>
    `;
  }

  if(tab==="leads"){
    const leads = data.leads.filter(l => l.nombre || l.empresa);

    el.innerHTML = `
      <h2>Leads</h2>
      <table>
        <tr>
          <th>Nombre</th><th>Empresa</th><th>Rep</th>
          <th>Ciudad</th><th>Tel</th><th>Email</th><th>Stage</th>
        </tr>
        ${leads.map(l=>`
          <tr>
            <td>${l.nombre || "--"}</td>
            <td>${l.empresa || "--"}</td>
            <td>${l.rep || "--"}</td>
            <td>${l.ciudad || "--"}</td>
            <td>${l.tel || "--"}</td>
            <td>${l.email || "--"}</td>
            <td>${badge(l.stage || "--")}</td>
          </tr>
        `).join("")}
      </table>
    `;
  }
}

load();

</script>

</body>
</html>
