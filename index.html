<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PRO KICKS CRM</title>

<style>
body{font-family:Arial;background:#f5f5f5;padding:20px}
h1{margin-bottom:20px}
button{padding:8px 12px;margin-right:10px;cursor:pointer}
table{width:100%;border-collapse:collapse;margin-top:20px;background:#fff}
th,td{padding:10px;border:1px solid #ddd;text-align:left}
th{background:#eee}
</style>
</head>

<body>

<h1>PRO KICKS CRM</h1>

<div>
  <button onclick="tab='pipeline';render()">Pipeline</button>
  <button onclick="tab='comodatos';render()">Comodatos</button>
  <button onclick="tab='cobranza';render()">Cobranza</button>
</div>

<div id="app">Cargando...</div>

<script>

const API = "https://script.google.com/macros/s/AKfycbwzzE4ESNn1-dQmlgupZhIrCCI76Skf5IWBAK61OhIv2hAZMbkepNB7O5cm7SGojr0kfg/exec";

let data = {};
let tab = "pipeline";

async function load(){
  const res = await fetch(API);
  data = await res.json();
  render();
}

function render(){
  const el = document.getElementById("app");

  if(tab==="pipeline"){
    el.innerHTML = `
      <h2>Pipeline</h2>
      <table>
        <tr><th>Cliente</th><th>Rep</th><th>Devices</th><th>Venta</th><th>Pago</th><th>Saldo</th><th>Ciudad</th></tr>
        ${data.pipeline.map(r=>`
          <tr>
            <td>${r.cliente}</td>
            <td>${r.rep}</td>
            <td>${r.devices}</td>
            <td>${r.estadoVenta}</td>
            <td>${r.estadoPago}</td>
            <td>${r.saldo}</td>
            <td>${r.ciudad}</td>
          </tr>
        `).join("")}
      </table>`;
  }

  if(tab==="comodatos"){
    el.innerHTML = `
      <h2>Comodatos</h2>
      <table>
        <tr><th>Cliente</th><th>Rep</th><th>Devices</th><th>Status</th><th>Ciudad</th></tr>
        ${data.comodatos.map(r=>`
          <tr>
            <td>${r.cliente}</td>
            <td>${r.rep}</td>
            <td>${r.devices}</td>
            <td>${r.estado}</td>
            <td>${r.ciudad}</td>
          </tr>
        `).join("")}
      </table>`;
  }

  if(tab==="cobranza"){
    el.innerHTML = `
      <h2>Cobranza</h2>
      <table>
        <tr><th>Cliente</th><th>Rep</th><th>Saldo</th><th>Status</th></tr>
        ${data.cobranza.map(r=>`
          <tr>
            <td>${r.cliente}</td>
            <td>${r.rep}</td>
            <td>${r.saldo}</td>
            <td>${r.estado}</td>
          </tr>
        `).join("")}
      </table>`;
  }
}

load();

</script>

</body>
</html>
